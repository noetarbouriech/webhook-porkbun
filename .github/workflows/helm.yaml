name: helm

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_DIR: deploy/porkbun-webhook
  CHART_NAME: porkbun-webhook
  OCI_REPO: ghcr.io/${{ github.repository }}/charts

jobs:
  package-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        run: helm lint "${{ env.CHART_DIR }}"

      - name: Determine chart version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=${v}" >> "${GITHUB_OUTPUT}"

      - name: Package chart
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package "${{ env.CHART_DIR }}" \
            --destination dist \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}"

      - name: Login to GHCR (OCI)
        if: github.event_name != 'pull_request'
        env:
          HELM_EXPERIMENTAL_OCI: "1"
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ env.REGISTRY }}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart (OCI)
        if: github.event_name != 'pull_request'
        env:
          HELM_EXPERIMENTAL_OCI: "1"
        run: |
          set -euo pipefail
          pkg="$(ls -1 dist/${{ env.CHART_NAME }}-*.tgz | head -n 1)"
          helm push "${pkg}" "oci://${{ env.OCI_REPO }}"

      - name: Upload chart package artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz
          if-no-files-found: error
