name: Publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  KO_DOCKER_REPO: ghcr.io/noetarbouriech/webhook-porkbun

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: ko-build/setup-ko@v0.8
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish
        shell: bash
        run: |
          set -euo pipefail
          SHA_TAG="sha-${GITHUB_SHA::7}"
          ko build --bare --platform=linux/amd64 --tags="main,latest,${SHA_TAG}" .
